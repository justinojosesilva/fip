x-service-defaults: &service_defaults
  restart: unless-stopped
  networks:
    - fip_network

x-engine-defaults: &engine_defaults
  <<: *service_defaults
  mem_limit: 512m

x-writer-defaults: &writer_defaults
  <<: *service_defaults
  mem_limit: 256m

x-collector-defaults: &collector_defaults
  <<: *service_defaults
  mem_limit: 128m

x-env-defaults: &env_defaults
  POSTGRES_HOST: postgres
  POSTGRES_DB: fip_postgres
  POSTGRES_USER: fip_postgres
  POSTGRES_PASSWORD: fip_postgres
  KAFKA_SERVER: kafka:9092

services:
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: fip_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=fip_postgres
      - POSTGRES_PASSWORD=fip_postgres
      - POSTGRES_DB=fip_postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../database/init:/docker-entrypoint-initdb.d
    networks:
      - fip_network
  
  redis:
    image: redis:7
    container_name: fip_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - fip_network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: fip_zookeeper
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
    ports:
      - "2181:2181"
    networks:
      - fip_network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: fip_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
    healthcheck:
      test: ["CMD", "bash", "-c", "nc -z localhost 9092"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fip_network
      
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: fip_kafka_ui
    ports:
      - "8080:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
      - KAFKA_CLUSTERS_0_ZOOKEEPER=zookeeper:2181
    depends_on:
      - kafka
    networks:
      - fip_network
  
  trades_collector:
    <<: *collector_defaults
    build: 
      context: ../..
      dockerfile: collectors/crypto/trades-collector/Dockerfile
    container_name: trades_collector
    depends_on:
      - postgres
      - kafka
    environment:
      <<: *env_defaults
      
  liquidation_collector:
