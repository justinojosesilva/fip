services:
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: fip_postgres
    restart: always
    environment:
      - POSTGRES_USER=fip_postgres
      - POSTGRES_PASSWORD=fip_postgres
      - POSTGRES_DB=fip_postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../database/init:/docker-entrypoint-initdb.d
  
  redis:
    image: redis:7
    container_name: fip_redis
    restart: always
    ports:
      - "6379:6379"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: fip_zookeeper
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: fip_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: fip_kafka_ui
    ports:
      - "8080:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
      - KAFKA_CLUSTERS_0_ZOOKEEPER=zookeeper:2181
    depends_on:
      - kafka
  
  crypto_collector:
    build: ../../collectors/crypto/market-collector
    container_name: crypto_collector
    depends_on:
      - postgres
      - kafka
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=fip_postgres
      - POSTGRES_USER=fip_postgres
      - POSTGRES_PASSWORD=fip_postgres
      - KAFKA_SERVER=kafka:9092
  
  indicators_engine:
    build: ../../services/crypto/indicators-engine
    container_name: indicators_engine
    depends_on:
      - postgres
      - kafka
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=fip_postgres
      - POSTGRES_USER=fip_postgres
      - POSTGRES_PASSWORD=fip_postgres
      - KAFKA_SERVER=kafka:9092
  
  whale_tracker:
    build: ../../services/crypto/whale-tracker
    container_name: whale_tracker
    depends_on:
      - postgres
      - kafka
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=fip_postgres
      - POSTGRES_USER=fip_postgres
      - POSTGRES_PASSWORD=fip_postgres
      - KAFKA_SERVER=kafka:9092
  
  orderflow_engine:
    build: ../../services/crypto/orderflow-engine
    container_name: orderflow_engine
    depends_on:
      - postgres
      - kafka
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=fip_postgres
      - POSTGRES_USER=fip_postgres
      - POSTGRES_PASSWORD=fip_postgres
      - KAFKA_SERVER=kafka:9092
  
  orderbook_collector:
    build: ../../collectors/crypto/orderbook-collector
    container_name: orderbook_collector
    depends_on:
      - postgres
      - kafka
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=fip_postgres
      - POSTGRES_USER=fip_postgres
      - POSTGRES_PASSWORD=fip_postgres
      - KAFKA_SERVER=kafka:9092
  
  orderbook_engine:
    build: ../../services/crypto/orderbook-engine
    container_name: orderbook_engine
    depends_on:
      - postgres
      - kafka
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=fip_postgres
      - POSTGRES_USER=fip_postgres
      - POSTGRES_PASSWORD=fip_postgres
      - KAFKA_SERVER=kafka:9092
      
volumes:
  postgres_data: